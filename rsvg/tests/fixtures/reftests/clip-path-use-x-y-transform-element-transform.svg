<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Test that a <use> inside clipPath composes its transform with the referenced
       element's correctly.
  -->
  <defs>
    <rect id="rect" x="0" y="0" width="5" height="5" transform="scale(4 4)"/>
    <clipPath id="clip1">
      <use href="#rect" x="15" y="15" transform="scale(2 2)"/>
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <path id="foo" d="M20,20 h40 v80 h40 v-40 h-80 Z" fill="#00ff00" clip-path="url(#clip1)"/>
</svg>
